<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Futterrechner – Stall Ultra</title>

<style>
body{font-family:Arial;margin:0;background:#eef1f4}
header{background:#2f3b45;color:#fff;padding:14px;text-align:center;font-size:22px}
.tabs{display:flex}
.tab{flex:1;padding:14px;text-align:center;background:#d5dbe0;font-size:18px}
.tab.active{background:#2f3b45;color:#fff}
.panel{padding:14px}
.hidden{display:none}

/* Kategorien */
.category{border-radius:14px;margin-bottom:18px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.cat-header{padding:16px;color:#fff;font-weight:bold;display:flex;justify-content:space-between;font-size:20px}
.cat-body{background:#fff;padding:14px}
.category.collapsed .cat-body{display:none}

.cat-kuehe{background:#2f80ed}
.cat-bullen{background:#27ae60}
.cat-trocken{background:#f2a900}
.cat-kaelber{background:#9b59b6}

/* Tabelle */
table{width:100%;border-collapse:collapse;font-size:18px}
th,td{border-bottom:1px solid #ddd;padding:10px;text-align:right}
th:first-child,td:first-child{text-align:left;font-weight:bold}

/* Sort */
.sort-btn{border:none;background:#e0e0e0;padding:6px;border-radius:6px;font-size:16px}
.sort-row{display:grid;grid-template-columns:50px 1fr;gap:10px;margin-bottom:8px}

/* Summe */
.total{background:#2f3b45;color:#fff;padding:14px;border-radius:10px;margin-top:10px;display:flex;justify-content:space-between;font-size:20px;font-weight:bold}
.kilo-btn{padding:8px 14px;border-radius:8px;border:none;background:#ccc;font-size:16px}
.kilo-btn.active{background:#2f80ed;color:#fff}
.inline-total-input{width:140px;font-size:18px}

/* AGF/MLF */
.agf{color:#b30000;font-weight:bold}
.mlf{color:#003399;font-weight:bold}

/* Taschenrechner */
.calc-box{max-width:380px;margin:auto;background:#fff;padding:14px;border-radius:14px}
.calc-display{background:#eef1f4;padding:14px;font-size:26px;text-align:right;border-radius:8px;margin-bottom:12px}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.calc-btn{padding:18px;font-size:20px;border:none;border-radius:10px;background:#d5dbe0}
.calc-btn.op{background:#2f80ed;color:#fff}
.calc-btn.eq{background:#27ae60;color:#fff}
.calc-btn.clear{background:#b30000;color:#fff}
.calc-history{margin-top:14px;font-size:16px;background:#f5f7fa;padding:10px;border-radius:8px;max-height:180px;overflow:auto}

/* Inline Edit */
.editable{cursor:text;border-bottom:1px dashed #000;display:inline-flex;gap:4px}
</style>
</head>

<body>

<header>🐄 Futterrechner — Stall Ultra</header>

<div class="tabs">
  <div class="tab active" data-tab="calc">Rechner</div>
  <div class="tab" data-tab="settings">Einstellungen</div>
  <div class="tab" data-tab="calc2">Taschenrechner</div>
</div>

<div id="calc" class="panel"></div>
<div id="settings" class="panel hidden"></div>
<div id="calc2" class="panel hidden"></div>

<script>
/* ================= BASIS ================= */
const $=id=>document.getElementById(id);
const num=v=>isNaN(parseFloat(v))?0:parseFloat(v);
const fmt=s=>{s=Math.round(s);return Math.floor(s/60)+" min "+(s%60)+" s";};

/* Tabs */
document.querySelectorAll(".tab").forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    ["calc","settings","calc2"].forEach(id=>$(id).classList.toggle("hidden",id!==t.dataset.tab));
  };
});

/* ================= DATEN ================= */
let globalCfg=JSON.parse(localStorage.getItem("gCfg"))||{
  agfName:"AGF",mlfName:"MLF",agfKg:0.5,mlfKg:0.5,
  kueheName:"Kühe",bullenName:"Bullen",trockenName:"Trockensteher",kaelberName:"Kälber"
};

const CATS=[
  {id:"kuehe",cls:"cat-kuehe"},
  {id:"bullen",cls:"cat-bullen"},
  {id:"trocken",cls:"cat-trocken"},
  {id:"kaelber",cls:"cat-kaelber"}
];

function defItems(){
  let a=[];
  for(let i=1;i<=8;i++)a.push({name:"Futter "+i,kg:0});
  a.push({type:"agf",kg:0},{type:"mlf",kg:0});
  return a;
}

let data=JSON.parse(localStorage.getItem("futter"))||{
  kuehe:{anz:100,items:defItems(),collapsed:false},
  bullen:{anz:10,items:defItems(),collapsed:false},
  trocken:{anz:5,items:defItems(),collapsed:false},
  kaelber:{anz:20,items:defItems(),collapsed:false}
};

const save=()=>localStorage.setItem("futter",JSON.stringify(data));
const saveGlobal=()=>localStorage.setItem("gCfg",JSON.stringify(globalCfg));

/* ================= RECHNER ================= */
let kiloMode={},sortMode=false;

function buildCalc(){
  $("calc").innerHTML="";
  CATS.forEach(c=>{
    let sum=0,lauf=0,rows="";
    data[c.id].items.forEach(it=>{
      if(num(it.kg)<=0)return;
      let g=num(it.kg)*num(data[c.id].anz);
      let name=it.type==="agf"?globalCfg.agfName:it.type==="mlf"?globalCfg.mlfName:it.name;
      let zeit="-";
      if(it.type==="agf")zeit=`<span class="agf">${fmt(g/globalCfg.agfKg)}</span>`;
      if(it.type==="mlf")zeit=`<span class="mlf">${fmt(g/globalCfg.mlfKg)}</span>`;
      lauf+=g;sum+=g;
      rows+=`<tr><td>${name}</td><td>${g.toFixed(1)}</td><td>${lauf.toFixed(1)}</td><td>${zeit}</td></tr>`;
    });

    $("calc").insertAdjacentHTML("beforeend",`
    <div class="category ${data[c.id].collapsed?"collapsed":""}">
      <div class="cat-header ${c.cls}" data-cat="${c.id}">
        ${globalCfg[c.id+"Name"]}<span>${data[c.id].collapsed?"▼":"▲"}</span>
      </div>
      <div class="cat-body">
        Tiere: <input type="number" value="${data[c.id].anz}" data-anz="${c.id}">
        <table>
          <tr><th>Futter</th><th>kg</th><th>Summe</th><th>Zeit</th></tr>
          ${rows||"<tr><td colspan=4>–</td></tr>"}
        </table>
        <div class="total">
          Gesamt: ${sum.toFixed(1)} kg
          <button class="kilo-btn ${kiloMode[c.id]?"active":""}" onclick="kiloMode['${c.id}']=!kiloMode['${c.id}'];buildCalc()">kilo</button>
        </div>
      </div>
    </div>`);
  });

  document.querySelectorAll(".cat-header").forEach(h=>{
    h.onclick=()=>{data[h.dataset.cat].collapsed=!data[h.dataset.cat].collapsed;save();buildCalc();};
  });

  document.querySelectorAll("input[data-anz]").forEach(i=>{
    i.oninput=()=>{data[i.dataset.anz].anz=num(i.value);save();};
    i.onblur=buildCalc;
  });
}

/* ================= EINSTELLUNGEN ================= */
function buildSettings(){
  $("settings").innerHTML=`
  <h3>AGF / MLF</h3>
  AGF Name <input value="${globalCfg.agfName}" oninput="globalCfg.agfName=this.value;saveGlobal();buildCalc()"><br>
  kg/s <input type="number" value="${globalCfg.agfKg}" oninput="globalCfg.agfKg=num(this.value)||0.01;saveGlobal();buildCalc()"><br><br>
  MLF Name <input value="${globalCfg.mlfName}" oninput="globalCfg.mlfName=this.value;saveGlobal();buildCalc()"><br>
  kg/s <input type="number" value="${globalCfg.mlfKg}" oninput="globalCfg.mlfKg=num(this.value)||0.01;saveGlobal();buildCalc()">
  `;
}

/* ================= TASCHENRECHNER ================= */
let expr="",history=JSON.parse(localStorage.getItem("calcHist"))||[];
function press(v){
  if(v==="C"){expr="";update();return;}
  if(v==="="){
    try{let r=Function("return "+expr)();history.unshift(expr+" = "+r);history=history.slice(0,20);localStorage.setItem("calcHist",JSON.stringify(history));expr=""+r;}
    catch{expr="";}
    update();renderHist();return;
  }
  expr+=v;update();
}
function update(){$("disp").innerText=expr||"0";}
function renderHist(){$("hist").innerHTML=history.map(h=>"<div>"+h+"</div>").join("");}
function buildCalc2(){
  $("calc2").innerHTML=`
  <div class="calc-box">
    <div id="disp" class="calc-display">0</div>
    <div class="calc-grid">
      ${["7","8","9","/","4","5","6","*","1","2","3","-","C","0","=","+"]
      .map(v=>`<button class="calc-btn ${v==="="? "eq": "+-*/".includes(v)? "op": v==="C"? "clear":""}" onclick="press('${v}')">${v}</button>`).join("")}
    </div>
    <div id="hist" class="calc-history"></div>
  </div>`;
  renderHist();
}

/* ================= START ================= */
buildCalc();
buildSettings();
buildCalc2();
</script>

</body>
</html>
