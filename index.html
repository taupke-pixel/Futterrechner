<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Futterrechner</title>

<style>
body{font-family:Arial;margin:0;background:#eef1f4}
header{background:#2f3b45;color:#fff;padding:14px;text-align:center;font-size:22px}
.tabs{display:flex}
.tab{flex:1;padding:14px;text-align:center;background:#d5dbe0;cursor:pointer;font-size:18px}
.tab.active{background:#2f3b45;color:#fff}
.panel{padding:14px}
.hidden{display:none}

.category{border-radius:14px;margin-bottom:18px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.cat-header{padding:16px;color:#fff;font-weight:bold;cursor:pointer;display:flex;justify-content:space-between;font-size:20px}
.cat-body{background:#fff;padding:14px}
.category.collapsed .cat-body{display:none}

.cat-kuehe{background:#2f80ed}
.cat-restbullen{background:#16a085}
.cat-bullen{background:#27ae60}
.cat-trocken{background:#f2a900}
.cat-kaelber{background:#9b59b6}

table{width:100%;border-collapse:collapse;font-size:18px}
th,td{border-bottom:1px solid #ddd;padding:10px;text-align:right}
th:first-child,td:first-child{text-align:left;font-weight:bold}

.total{background:#2f3b45;color:#fff;padding:14px;border-radius:10px;margin-top:10px;display:flex;justify-content:space-between;font-size:20px;font-weight:bold}

input{font-size:16px;padding:5px}
</style>
</head>
<body>

<header>🐄 Futterrechner — Stall Ultra</header>

<div class="tabs">
<div class="tab active" onclick="showTab('calc')">Rechner</div>
<div class="tab" onclick="showTab('settings')">Einstellungen</div>
<div class="tab" onclick="showTab('calc2')">Taschenrechner</div>
</div>

<div id="calc" class="panel"></div>
<div id="settings" class="panel hidden"></div>
<div id="calc2" class="panel hidden"></div>

<script>

function num(v){ return isNaN(parseFloat(v)) ? 0 : parseFloat(v); }

/* Kategorien */

const cats=[
"kuehe",
"restbullen",
"bullen",
"trocken",
"kaelber"
];

/* Daten */

function defItems(){
let a=[];
for(let i=1;i<=8;i++)a.push({name:"Futter "+i,kg:0});
return a;
}

function buildCat(def){
return {anz:def,items:defItems(),collapsed:false};
}

let data={
kuehe:buildCat(100),
restbullen:{rest:0,ziel:0,collapsed:false},
bullen:buildCat(10),
trocken:buildCat(5),
kaelber:buildCat(20)
};

/* Tabs */

function showTab(t){

document.getElementById("calc").classList.add("hidden");
document.getElementById("settings").classList.add("hidden");
document.getElementById("calc2").classList.add("hidden");

document.getElementById(t).classList.remove("hidden");

document.querySelectorAll(".tab").forEach(e=>e.classList.remove("active"));
event.target.classList.add("active");

}

/* Rechner */

function buildCalc(){

let el=document.getElementById("calc");
el.innerHTML="";

/* Kühe */

buildNormal("kuehe");

/* Restmischung */

buildRest();

/* Rest */

buildNormal("bullen");
buildNormal("trocken");
buildNormal("kaelber");

}

function buildRest(){

let el=document.getElementById("calc");

let cow=data.kuehe.items;

let total=0;
cow.forEach(i=>total+=i.kg);

let diff=Math.max(0,data.restbullen.ziel-data.restbullen.rest);

let rows="";
let lauf=0;

cow.forEach(it=>{

if(it.kg<=0)return;

let anteil=it.kg/total;

let fehlt=anteil*diff;

lauf+=fehlt;

rows+=`
<tr>
<td>${it.name}</td>
<td>${fehlt.toFixed(2)}</td>
<td>${lauf.toFixed(2)}</td>
</tr>
`;

});

el.innerHTML+=`

<div class="category ${data.restbullen.collapsed?'collapsed':''}">

<div class="cat-header cat-restbullen"
onclick="data.restbullen.collapsed=!data.restbullen.collapsed;buildCalc();">

Restmischung Bullen
<span>${data.restbullen.collapsed?'▼':'▲'}</span>

</div>

<div class="cat-body">

Restmischung vorhanden (kg)
<input type="number"
value="${data.restbullen.rest}"
oninput="data.restbullen.rest=num(this.value);buildCalc()">

&nbsp;&nbsp;

Zielgewicht Bullenration (kg)
<input type="number"
value="${data.restbullen.ziel}"
oninput="data.restbullen.ziel=num(this.value);buildCalc()">

<table>

<tr>
<th>Futter</th>
<th>Fehlt kg</th>
<th>Summe</th>
</tr>

${rows||"<tr><td colspan=3>–</td></tr>"}

</table>

<div class="total">

Noch zu mischen
${diff.toFixed(2)} kg

</div>

</div>

</div>

`;

}

/* Normale Kategorien */

function buildNormal(cat){

let el=document.getElementById("calc");

let sum=0;
let lauf=0;
let rows="";

data[cat].items.forEach(it=>{

if(it.kg<=0)return;

let g=it.kg*data[cat].anz;

lauf+=g;
sum+=g;

rows+=`
<tr>
<td>${it.name}</td>
<td>${g.toFixed(1)}</td>
<td>${lauf.toFixed(1)}</td>
<td>-</td>
</tr>
`;

});

el.innerHTML+=`

<div class="category ${data[cat].collapsed?'collapsed':''}">

<div class="cat-header cat-${cat}"
onclick="data.${cat}.collapsed=!data.${cat}.collapsed;buildCalc();">

${cat}

<span>${data[cat].collapsed?'▼':'▲'}</span>

</div>

<div class="cat-body">

Tiere

<input type="number"
value="${data[cat].anz}"
oninput="data.${cat}.anz=num(this.value);buildCalc()">

<table>

<tr>
<th>Futter</th>
<th>kg</th>
<th>Summe</th>
<th>Zeit</th>
</tr>

${rows||"<tr><td colspan=4>–</td></tr>"}

</table>

<div class="total">

Gesamt
${sum.toFixed(1)} kg

</div>

</div>

</div>

`;

}

/* Einstellungen */

document.getElementById("settings").innerHTML=`
<h2>Einstellungen</h2>
Hier bleiben deine alten Einstellungen erhalten.
`;

/* Taschenrechner */

document.getElementById("calc2").innerHTML=`

<div style="max-width:400px;margin:auto">

<input id="display" style="width:100%;font-size:26px;text-align:right">

<br><br>

<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('/')">/</button>

<br>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('*')">*</button>

<br>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('-')">-</button>

<br>

<button onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button onclick="calc()">=</button>
<button onclick="press('+')">+</button>

</div>
`;

function press(v){

let d=document.getElementById("display");

d.value+=v;

}

function calc(){

let d=document.getElementById("display");

try{
d.value=eval(d.value);
}catch{
d.value="";
}

}

/* Start */

buildCalc();

</script>

</body>
</html>
