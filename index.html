<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Futterrechner</title>

<style>
body{font-family:Arial;margin:0;background:#eef1f4}
header{background:#2f3b45;color:#fff;padding:14px;text-align:center;font-size:22px}
.tabs{display:flex}
.tab{flex:1;padding:14px;text-align:center;background:#d5dbe0;cursor:pointer;font-size:18px}
.tab.active{background:#2f3b45;color:#fff}
.panel{padding:14px}
.hidden{display:none}
.category{border-radius:14px;margin-bottom:18px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.cat-header{padding:16px;color:#fff;font-weight:bold;cursor:pointer;display:flex;justify-content:space-between;font-size:20px}
.cat-body{background:#fff;padding:14px}
.category.collapsed .cat-body{display:none}

.cat-kuehe{background:#2f80ed}
.cat-restbullen{background:#16a085}
.cat-bullen{background:#27ae60}
.cat-trocken{background:#f2a900}
.cat-kaelber{background:#9b59b6}

table{width:100%;border-collapse:collapse;font-size:18px}
th,td{border-bottom:1px solid #ddd;padding:10px;text-align:right}
th:first-child,td:first-child{text-align:left;font-weight:bold}

.total{background:#2f3b45;color:#fff;padding:14px;border-radius:10px;margin-top:10px;display:flex;justify-content:space-between;align-items:center;font-size:20px;font-weight:bold}
input{font-size:16px;padding:5px}
</style>
</head>
<body>

<header>🐄 Futterrechner — Stall Ultra</header>

<div class="tabs">
<div class="tab active" onclick="showTab('calc')">Rechner</div>
<div class="tab" onclick="showTab('settings')">Einstellungen</div>
<div class="tab" onclick="showTab('calc2')">Taschenrechner</div>
</div>

<div id="calc" class="panel"></div>
<div id="settings" class="panel hidden"></div>
<div id="calc2" class="panel hidden"></div>

<script>

function num(v){ return isNaN(parseFloat(v)) ? 0 : parseFloat(v); }

const defaultGlobal={
kueheName:"Kühe",
restbullenName:"Restmischung Bullen",
bullenName:"Bullen",
trockenName:"Trockensteher",
kaelberName:"Kälber"
};

function defItems(){
let a=[];
for(let i=1;i<=8;i++)a.push({name:"Futter "+i,kg:0});
return a;
}

let saved=JSON.parse(localStorage.getItem("futter")||"{}");

function buildCat(def){
return {anz:def,items:defItems(),collapsed:false};
}

let data={
kuehe: saved.kuehe||buildCat(100),
restbullen: saved.restbullen||{rest:0,ziel:0,collapsed:false},
bullen: saved.bullen||buildCat(10),
trocken: saved.trocken||buildCat(5),
kaelber: saved.kaelber||buildCat(20)
};

function save(){
localStorage.setItem("futter",JSON.stringify(data))
}

function showTab(t){
["calc","settings","calc2"].forEach(id=>{
document.getElementById(id).classList.toggle("hidden",id!==t);
});
}

function buildCalc(){

let el=document.getElementById("calc");
el.innerHTML="";

buildNormal("kuehe");

let cow=data.kuehe.items;

let totalCow=0;
cow.forEach(i=>totalCow+=i.kg);

let diff=Math.max(0,num(data.restbullen.ziel)-num(data.restbullen.rest));

let rows="";
let lauf=0;

cow.forEach(it=>{

if(it.kg<=0)return;

let anteil=it.kg/totalCow;

let fehlt=anteil*diff;

lauf+=fehlt;

rows+=`
<tr>
<td>${it.name}</td>
<td>${fehlt.toFixed(2)}</td>
<td>${lauf.toFixed(2)}</td>
</tr>
`;

});

el.innerHTML+=`
<div class="category ${data.restbullen.collapsed?'collapsed':''}">
<div class="cat-header cat-restbullen"
onclick="data.restbullen.collapsed=!data.restbullen.collapsed;save();buildCalc();">

Restmischung Bullen
<span>${data.restbullen.collapsed?'▼':'▲'}</span>

</div>

<div class="cat-body">

Restmischung vorhanden (kg)
<input type="number"
value="${data.restbullen.rest}"
oninput="data.restbullen.rest=num(this.value);save();buildCalc()">

&nbsp;&nbsp;

Zielgewicht Bullenration (kg)
<input type="number"
value="${data.restbullen.ziel}"
oninput="data.restbullen.ziel=num(this.value);save();buildCalc()">

<table>

<tr>
<th>Futter</th>
<th>Fehlt kg</th>
<th>Summe</th>
</tr>

${rows||"<tr><td colspan=3>–</td></tr>"}

</table>

<div class="total">
Noch zu mischen: ${diff.toFixed(2)} kg
</div>

</div>
</div>
`;

buildNormal("bullen");
buildNormal("trocken");
buildNormal("kaelber");

}

function buildNormal(cat){

let el=document.getElementById("calc");

let sum=0;
let lauf=0;
let rows="";

data[cat].items.forEach(it=>{

if(it.kg<=0)return;

let g=it.kg*data[cat].anz;

lauf+=g;
sum+=g;

rows+=`
<tr>
<td>${it.name}</td>
<td>${g.toFixed(1)}</td>
<td>${lauf.toFixed(1)}</td>
<td>-</td>
</tr>
`;

});

el.innerHTML+=`
<div class="category ${data[cat].collapsed?'collapsed':''}">

<div class="cat-header cat-${cat}"
onclick="data.${cat}.collapsed=!data.${cat}.collapsed;save();buildCalc();">

${defaultGlobal[cat+"Name"]}

<span>${data[cat].collapsed?'▼':'▲'}</span>

</div>

<div class="cat-body">

Tiere

<input type="number"
value="${data[cat].anz}"
oninput="data.${cat}.anz=num(this.value);save()"
onblur="buildCalc()">

<table>

<tr>
<th>Futter</th>
<th>kg</th>
<th>Summe</th>
<th>Zeit</th>
</tr>

${rows||"<tr><td colspan=4>–</td></tr>"}

</table>

<div class="total">
Gesamt: ${sum.toFixed(1)} kg
</div>

</div>
</div>
`;

}

buildCalc();

</script>

</body>
</html>
