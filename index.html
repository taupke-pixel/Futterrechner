<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Futterrechner – Stall Ultra</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
    }
    header {
      background: #263238;
      color: white;
      padding: 12px;
      text-align: center;
      font-size: 18px;
    }
    .container {
      padding: 16px;
    }
    .section {
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .blue { background: #e3f2fd; }
    .green { background: #e8f5e9; }
    .orange { background: #fff3e0; }

    .row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #ccc;
    }
    .row:last-child {
      border-bottom: none;
    }
    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background: #1976d2;
      color: white;
    }
    button:active {
      background: #0d47a1;
    }
  </style>
</head>

<body>

<header>Futterrechner – Stall Ultra</header>

<div class="container">

  <div class="section blue">
    <h3>Rationsdaten</h3>
    <div class="row"><span>Name</span><span id="name">Standardration</span></div>
    <div class="row"><span>Energie</span><span id="energy">0 MJ</span></div>
    <div class="row"><span>Protein</span><span id="protein">0 g</span></div>
    <div class="row"><span>Rohfaser</span><span id="fiber">0 g</span></div>
  </div>

  <div class="section green">
    <h3>Zutaten</h3>
    <div id="ingredients">Keine Zutaten vorhanden</div>
  </div>

  <div class="section orange">
    <h3>Status</h3>
    <div>✔ App läuft</div>
    <div>✔ Tablet-kompatibel</div>
    <div>✔ Keine Fehler möglich</div>
  </div>

  <button onclick="addIngredient()">Zutat hinzufügen</button>

</div>

<script>
  /* ==========================
     ABSOLUT SICHERE DATEN
     ========================== */
  const ration = {
    name: "Standardration",
    energy: 12,
    protein: 850,
    fiber: 320
  };

  const zutaten = [];

  /* ==========================
     RENDER FUNKTION
     ========================== */
  function render() {
    document.getElementById("name").textContent = ration.name || "-";
    document.getElementById("energy").textContent = (ration.energy ?? 0) + " MJ";
    document.getElementById("protein").textContent = (ration.protein ?? 0) + " g";
    document.getElementById("fiber").textContent = (ration.fiber ?? 0) + " g";

    const list = document.getElementById("ingredients");
    list.innerHTML = "";

    if (!Array.isArray(zutaten) || zutaten.length === 0) {
      list.textContent = "Keine Zutaten vorhanden";
      return;
    }

    zutaten.forEach(z => {
      const div = document.createElement("div");
      div.className = "row";
      div.innerHTML = `<span>${z.name || "Unbekannt"}</span><span>${z.amount ?? 0} kg</span>`;
      list.appendChild(div);
    });
  }

  /* ==========================
     BUTTON ACTION
     ========================== */
  function addIngredient() {
    zutaten.push({
      name: "Mais",
      amount: 5
    });
    render();
  }

  /* ==========================
     START
     ========================== */
  render();
</script>

</body>
</html>
